version: "3.8"

services:
  faithfulai-api:
    build: .
    container_name: faithfulai-api
    ports:
      - "8100:8100"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HF_API_TOKEN=${HF_API_TOKEN}
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - LLM_MODEL=${LLM_MODEL:-llama-3.3-70b-versatile}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn server.api:app --host 0.0.0.0 --port 8100 --reload
    restart: unless-stopped
